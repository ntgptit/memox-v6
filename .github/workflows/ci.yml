name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  warm_cache:
    name: Warm fast-gate cache
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true

      - name: Restore generated build cache
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool/build
            .dart_tool/package_config.json
            .dart_tool/package_graph.json
            lib/**/*.g.dart
            lib/**/*.freezed.dart
            lib/l10n/generated
            test/**/*.g.dart
            test/**/*.mocks.dart
          key: memox-generated-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'build.yaml', 'l10n.yaml', 'lib/**/*.dart', 'lib/l10n/*.arb', 'test/**/*.dart') }}
          restore-keys: |
            memox-generated-${{ runner.os }}-

      - name: Refresh generated build cache
        run: node tool/verify/run.mjs --warm-cache

  scope:
    name: Resolve PR scope
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
      scope: ${{ steps.scope.outputs.scope }}
      visual_changes: ${{ steps.scope.outputs.visual_changes }}
      test_count: ${{ steps.scope.outputs.test_count }}
    steps:
      - name: Checkout history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select verification scope
        id: scope
        run: >-
          node tool/verify/ci_scope.mjs
          --base '${{ github.event.pull_request.base.sha }}'
          --head '${{ github.event.pull_request.head.sha }}'
          --github-output "$GITHUB_OUTPUT"

  contracts:
    name: Contracts and architecture
    if: github.event_name == 'pull_request'
    needs: scope
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with guard submodule
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            tools/requirements-ci.txt
            tools/code-verification-guard/requirements.txt

      - name: Install verification dependencies
        run: python -m pip install -r tools/requirements-ci.txt

      - name: Run contracts gate
        run: node tool/verify/run.mjs --docs

  flutter_fast:
    name: Flutter fast gate
    if: >-
      github.event_name == 'pull_request' &&
      needs.scope.outputs.docs_only != 'true' &&
      !contains(github.event.pull_request.labels.*.name, 'full-ci')
    needs: scope
    runs-on: ubuntu-latest
    steps:
      - name: Checkout history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true

      - name: Restore generated build cache
        uses: actions/cache@v5
        with:
          path: |
            .dart_tool/build
            .dart_tool/package_config.json
            .dart_tool/package_graph.json
            lib/**/*.g.dart
            lib/**/*.freezed.dart
            lib/l10n/generated
            test/**/*.g.dart
            test/**/*.mocks.dart
          key: memox-generated-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'build.yaml', 'l10n.yaml', 'lib/**/*.dart', 'lib/l10n/*.arb', 'test/**/*.dart') }}
          restore-keys: |
            memox-generated-${{ runner.os }}-

      - name: Run affected Flutter gate
        run: >-
          node tool/verify/run.mjs
          --flutter-fast
          --base '${{ github.event.pull_request.base.sha }}'
          --head '${{ github.event.pull_request.head.sha }}'

  full_canonical:
    name: Full Canonical (Windows)
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'full-ci'))
    runs-on: windows-latest
    steps:
      - name: Checkout with guard submodule
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            tools/requirements-ci.txt
            tools/code-verification-guard/requirements.txt

      - name: Install verification dependencies
        run: python -m pip install -r tools/requirements-ci.txt

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          cache: true

      - name: Run full canonical verifier
        run: node tool/verify/run.mjs

  gate:
    name: CI Gate
    if: always() && github.event_name == 'pull_request'
    needs: [scope, contracts, flutter_fast, full_canonical]
    runs-on: ubuntu-latest
    steps:
      - name: Require the selected gates
        env:
          CONTRACTS_RESULT: ${{ needs.contracts.result }}
          DOCS_ONLY: ${{ needs.scope.outputs.docs_only }}
          FAST_RESULT: ${{ needs.flutter_fast.result }}
          FULL_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}
          FULL_RESULT: ${{ needs.full_canonical.result }}
          SCOPE_RESULT: ${{ needs.scope.result }}
        run: |
          if [[ "$SCOPE_RESULT" != "success" || "$CONTRACTS_RESULT" != "success" ]]; then
            exit 1
          fi
          if [[ "$FULL_LABEL" == "true" ]]; then
            [[ "$FULL_RESULT" == "success" ]]
            exit
          fi
          if [[ "$DOCS_ONLY" == "true" ]]; then
            [[ "$FAST_RESULT" == "skipped" ]]
            exit
          fi
          [[ "$FAST_RESULT" == "success" ]]
