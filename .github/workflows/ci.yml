name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Canonical MemoX verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with guard submodule
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install verification dependencies
        run: python -m pip install -r tools/code-verification-guard/requirements.txt pytest==9.0.2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run canonical verifier
        run: node tool/verify/run.mjs
